version: 3.5.0
afids:
  - id: AFID_0x1001
    description: Fan hardware failure detected
  - id: AFID_0x1002
    description: Fan restored to normal operation
  - id: AFID_0x2001
    description: Device over operating temperature fault
  - id: AFID_0x2002
    description: Device returned to normal operating temperature
  - id: AFID_0x3001
    description: Sensor reading above upper warning threshold
  - id: AFID_0x3002
    description: Sensor reading above upper critical threshold
  - id: AFID_0x3003
    description: Sensor reading above upper soft shutdown threshold
  - id: AFID_0x3004
    description: Sensor reading above upper hard shutdown threshold
  - id: AFID_0x3005
    description: Sensor reading below lower warning threshold
  - id: AFID_0x3006
    description: Sensor reading below lower critical threshold
  - id: AFID_0x3007
    description: Sensor reading below lower soft shutdown threshold
  - id: AFID_0x3008
    description: Sensor reading below lower hard shutdown threshold
  - id: AFID_0x3009
    description: Sensor reading critical
  - id: AFID_0x300A
    description: Sensor reading no longer critical
  - id: AFID_0x300B
    description: Sensor reading returned to normal range
